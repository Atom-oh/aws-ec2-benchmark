# ClickHouse 벤치마크용 StorageClass + VolumeSnapshotClass
#
# ⚠️ 이미 mall-apne2-mgmt 클러스터에 동일 값으로 존재함 (2026-06-25 확인).
#    값이 동일하므로 멱등 apply 안전 (재현성/문서화 목적).
#
# 목적: 모든 인스턴스가 동일한 최고 성능 gp3(16000 IOPS / 1000MB/s)를 사용하여
#       볼륨 자체의 디스크 성능 차이를 제거 → CPU/메모리만 비교.
#       (단, per-instance EBS 대역폭 상한은 별도 교란변수 — 설계 문서 §5 참고)
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3-clickhouse
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  iops: "16000"
  throughput: "1000"
  encrypted: "true"
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: gp3-clickhouse-snapclass
driver: ebs.csi.aws.com
deletionPolicy: Retain
