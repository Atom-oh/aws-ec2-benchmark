# ClickHouse hits 데이터 정적 VolumeSnapshot — snap-024c86faa00cd0448 (사용자 지정)
#
# 별도 이름 `clickhouse-hits-024`를 사용한다. 클러스터에 이미 있는 `clickhouse-hits-snap`
# (snap-057... 최신본)과 이름이 다르므로 충돌 없이 **live apply 가능**하다.
# deletionPolicy: Retain 이라 이 VolumeSnapshot을 지워도 원본 snap-024는 보존된다.
#
# 벤치마크 Job(clickhouse-clickbench.yaml)의 PVC dataSource 가 이 `clickhouse-hits-024`를 참조한다.
# 데이터: ClickHouse 24.8.14.39, default.hits (MergeTree), 99,997,497행, 13.44GiB (Phase 0 확인)
#
# 적용: kubectl apply -f benchmarks/clickhouse/clickhouse-snapshot.yaml
#       (generate-clickhouse-benchmark.sh 가 실행 전 자동 apply + readyToUse 확인)
---
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotContent
metadata:
  name: clickhouse-hits-024-content
spec:
  deletionPolicy: Retain
  driver: ebs.csi.aws.com
  volumeSnapshotClassName: gp3-clickhouse-snapclass
  source:
    snapshotHandle: snap-024c86faa00cd0448
  volumeSnapshotRef:
    name: clickhouse-hits-024
    namespace: benchmark
---
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshot
metadata:
  name: clickhouse-hits-024
  namespace: benchmark
spec:
  volumeSnapshotClassName: gp3-clickhouse-snapclass
  source:
    volumeSnapshotContentName: clickhouse-hits-024-content
